<div class="tfa-passkey-auth">
    <!-- ko if: currentStep() === 'idle' -->
    <fieldset class="admin__fieldset">
        <legend class="admin__legend"><span data-bind="i18n: 'Passkey Verification'"></span></legend>
        <button type="button"
                class="action-primary"
                data-bind="click: authenticate">
            <span data-bind="i18n: 'Authenticate with Passkey'"></span>
        </button>
    </fieldset>
    <!-- /ko -->

    <!-- ko if: currentStep() === 'authenticating' -->
    <div class="tfa-loading">
        <div class="spinner"></div>
        <p data-bind="i18n: 'Follow your browser\'s prompts to verify your passkey...'"></p>
    </div>
    <!-- /ko -->

    <!-- ko if: currentStep() === 'success' -->
    <div class="tfa-loading">
        <div class="spinner"></div>
        <p data-bind="i18n: 'Authenticated. Redirecting...'"></p>
    </div>
    <!-- /ko -->

    <!-- ko if: currentStep() === 'error' -->
    <div class="message message-error">
        <span data-bind="text: errorMessage"></span>
    </div>
    <button type="button" class="action-secondary" data-bind="click: retry">
        <span data-bind="i18n: 'Try Again'"></span>
    </button>
    <!-- /ko -->

    <!-- ko if: currentStep() === 'no-webauthn' -->
    <div class="message message-error">
        <span data-bind="i18n: 'Your browser does not support passkeys. Please use a modern browser over HTTPS.'"></span>
    </div>
    <!-- /ko -->
</div>
